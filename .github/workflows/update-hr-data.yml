name: Update HR distance data

on:
  workflow_dispatch:
  schedule:
    # Daily during the broad MLB season window.
    - cron: "17 10 * 3-11 *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh canonical pitch cache
        run: python scripts/generate_pitch_cache.py --season "$(date -u +%Y)"

      - name: Refresh Longball Index data
        run: python scripts/generate_hr_distance.py --season "$(date -u +%Y)" --min-hr 1 --input-csv data/raw/statcast-pitches.csv

      - name: Refresh Meatball Tracker data
        run: python scripts/generate_meatball_tracker.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add public/data/hr-distance-latest.json public/data/meatball-tracker-latest.json data/raw/statcast-pitches.csv
            git commit -m "Update home run distance data"
            git pull --rebase origin main
            git push
          else
            echo "No data changes to commit"
          fi
