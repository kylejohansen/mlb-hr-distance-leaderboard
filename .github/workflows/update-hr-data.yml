name: Update HR distance data

on:
  workflow_dispatch:
  schedule:
    # Daily during the broad MLB season window.
    - cron: "17 10 * 3-11 *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh HR distance data
        run: python scripts/generate_hr_distance.py --season "$(date -u +%Y)" --min-hr 1

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/hr-distance-latest.json data/raw/statcast-hr-events.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update HR distance data"
            git push origin HEAD:main
          fi
